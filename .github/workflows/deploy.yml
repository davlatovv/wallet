name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  DEPLOY_DIR: /home/wallet

jobs:
  # ── Проверка синтаксиса ────────────────────────────────────────────────────
  lint:
    name: Syntax check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: |
          find app -name "*.py" -print0 | xargs -0 python -m py_compile
          python -m py_compile main.py
          echo "✅ Syntax OK"

  # ── Деплой на VPS (только master) ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            git config --global --add safe.directory ${{ env.DEPLOY_DIR }}

            cd ${{ env.DEPLOY_DIR }}

            ENV_BACKUP=""
            restore_env() {
              if [ -n "$ENV_BACKUP" ] && [ -f "$ENV_BACKUP" ]; then
                mv "$ENV_BACKUP" .env
              fi
            }
            trap restore_env EXIT

            if git ls-files --error-unmatch .env >/dev/null 2>&1 && [ -f .env ]; then
              ENV_BACKUP="$(mktemp)"
              cp .env "$ENV_BACKUP"
              git checkout -- .env
            fi

            echo "📥 Pulling latest code..."
            git pull origin master

            restore_env
            trap - EXIT

            echo "🐳 Rebuilding containers..."
            docker compose up -d --build --remove-orphans

            echo "✅ Deploy complete"
            docker compose ps
